<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>โครงสร้างการกำกับดูแล - ESG Project</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Sarabun', sans-serif; 
            background-color: #ffffff; 
            color: #333;
            overflow-x: hidden; 
        }

        /* --- แผนผัง --- */
        .chart-container {
            width: 100vw; 
            background: #f9f9f9;
            padding: 60px 0;
            text-align: center;
        }

        /* บังคับขนาดกล่องให้เท่ากัน และลบ margin ที่ทำให้เบี้ยวออก */
        .org-box {
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            width: 220px; 
            height: 65px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            margin: 0; /* สำคัญ: ลบ margin เพื่อให้ align-items ทำงานได้แม่นยำ */
        }
        .bg-blue { background-color: #1e467a; }
        .bg-green { background-color: #28a745; }
        .bg-light-blue { background-color: #8dbde6; }
        .bg-gray { background-color: #e9ecef; color: #444; font-size: 13px; font-weight: 600; }

        .line-vertical {
            width: 2px;
            height: 35px;
            background: #1e467a;
            margin: 0 auto;
        }

        /* --- จุดที่ปรับ: ขยับกล่องสีเขียวขึ้นมาให้ตรงกัน --- */
        .secretary-row {
            display: flex;
            justify-content: center;
            align-items: center; /* ดึงกล่องเขียวขึ้นมาขนานกับกล่องน้ำเงินกึ่งกลางเป๊ะ */
            position: relative;
            /* ชดเชยเพื่อให้กล่องน้ำเงินอยู่ตรงกึ่งกลางหน้าจอพอดี */
            margin-left: -260px; 
        }

        .horizontal-line {
            width: 40px; /* ระยะห่างเส้นเชื่อม */
            height: 2px;
            background-color: #1e467a;
            flex-shrink: 0;
        }

        .center-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- ส่วนฝ่ายงานด้านล่าง --- */
        .dept-wrapper {
            display: flex;
            justify-content: space-between; 
            width: 95%; 
            max-width: 1400px; 
            margin: 0 auto;
            padding-top: 25px;
            border-top: 2px solid #1e467a; 
        }

        .dept-item {
            flex: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dept-item .org-box {
            width: 85%;
            height: 60px;
            font-size: 13px;
            margin: 12px 0;
        }

        .line-small {
            width: 2px;
            height: 25px;
            background: #1e467a;
        }

    </style>
</head>
<body>

    <div class="chart-container">
        <h3>ภาพรวมโครงสร้างการกำกับดูแล</h3>
        
        <div class="org-box bg-light-blue" style="display: flex; margin: 0 auto;">คณะทำงานด้านความยั่งยืน</div>
        <div class="line-vertical"></div>
        
        <div class="org-box bg-blue" style="display: flex; margin: 0 auto;">ประธานคณะทำงาน</div>
        <div class="line-vertical"></div>

        <div class="secretary-row">
            <div class="org-box bg-green">เลขานุการคณะทำงาน</div>
            <div class="horizontal-line"></div>
            <div class="center-column">
                <div class="org-box bg-blue">รองประธานคณะทำงาน</div>
                <div class="line-vertical" style="height: 50px;"></div>
            </div>
        </div>
        
        <div class="dept-wrapper">
            <div class="dept-item"><div class="line-small"></div><div class="org-box bg-gray">ฝ่ายบัญชี</div></div>
            <div class="dept-item"><div class="line-small"></div><div class="org-box bg-gray">ฝ่ายคลังและขนส่ง</div></div>
            <div class="dept-item"><div class="line-small"></div><div class="org-box bg-gray">ฝ่ายขาย</div></div>
            <div class="dept-item"><div class="line-small"></div><div class="org-box bg-gray">ฝ่ายจัดซื้อ</div></div>
            <div class="dept-item"><div class="line-small"></div><div class="org-box bg-gray">ฝ่ายบริหารกลาง</div></div>
            <div class="dept-item"><div class="line-small"></div><div class="org-box bg-gray">ฝ่ายขาย (2)</div></div>
            <div class="dept-item"><div class="line-small"></div><div class="org-box bg-gray">ULT</div></div>
            <div class="dept-item"><div class="line-small"></div><div class="org-box bg-gray">ฝ่ายไอที</div></div>
        </div>
        
        <p style="margin-top: 40px; font-size: 14px; color: #888; font-weight: bold;">
            หมายเหตุ: บริษัทฯ ได้ทบทวนการแต่งตั้งคณะทำงานด้านความยั่งยืน เมื่อวันที่ 21 กรกฎาคม 2568
        </p>
    </div>

</body>
</html>
