<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Web Ukem - ESG Project</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Sarabun', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-color: #000; /* สีพื้นหลังกันพลาดระหว่างเปลี่ยนรูป */
        }

        /* --- ระบบ Slideshow พื้นหลัง --- */
        .bg-slideshow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            list-style: none;
            margin: 0;
            padding: 0;
            z-index: -1;
        }

        .bg-slideshow li {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0; /* เริ่มที่จาง */
            /* วนลูป 18 วินาที (รูปละ 6 วิ) */
            animation: imageFade 18s linear infinite; 
        }

        /* --- จุดที่คุณต้องใส่ชื่อไฟล์ภาพ --- */
        .bg-slideshow li:nth-child(1) { 
            background-image: url('ใส่ชื่อรูปที่1.jpg'); 
            animation-delay: 0s; 
        }
        .bg-slideshow li:nth-child(2) { 
            background-image: url('ใส่ชื่อรูปที่2.jpg'); 
            animation-delay: 6s; 
        }
        .bg-slideshow li:nth-child(3) { 
            background-image: url('ใส่ชื่อรูปที่3.jpg'); 
            animation-delay: 12s; 
        }

        /* คำสั่งทำให้ภาพค่อยๆ Fade */
        @keyframes imageFade {
            0% { opacity: 0; }
            10% { opacity: 0.3; } /* ปรับความจางของรูปที่นี่ (0.3 คือกำลังสวย) */
            33% { opacity: 0.3; }
            43% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* เมนูหลัก */
        .main-nav {
            display: flex;
            align-items: center;
            padding: 0 50px;
            background: rgba(255, 255, 255, 0.9);
            height: 70px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .main-nav a {
            text-decoration: none;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .dropdown {
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 15px;
            cursor: pointer;
            color: #004a80;
            font-weight: bold;
            height: 100%;
            transition: 0.3s;
        }

        .dropdown:hover {
            color: #b08d3e;
            border-bottom: 3px solid #b08d3e;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 70px; 
            left: 0;
            background-color: white;
            min-width: 350px; 
            box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
            z-index: 100;
            padding: 10px 0;
        }

        .dropdown:hover .dropdown-content { display: block; }

        .dropdown-content a {
            color: #333;
            padding: 15px 25px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        /* ส่วนกลางหน้าจอ */
        .hero-section { 
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10%; 
        }

        .welcome-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 50px 80px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border-top: 6px solid #72ce60;
            backdrop-filter: blur(10px); /* เอฟเฟกต์กระจกฝ้า */
        }

        h1 { color: #1b5e20; font-size: 36px; margin-bottom: 10px; }
        p { color: #444; font-size: 18px; margin: 0; }
    </style>
</head>
<body>

    <ul class="bg-slideshow">
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <nav class="main-nav">
        <a href="index.html" class="dropdown">🏠</a>
        <a href="https://www.unionpetrochemical.com/th/" target="_blank" class="dropdown">เว็บไซต์หลัก</a>
        
        <div class="dropdown">
            ภาพรวมความยั่งยืน
            <div class="dropdown-content">
                <a href="สารจากประธานกรรมการบริษัท.html">สารจากประธานกรรมการบริษัท</a>
                <a href="#">การประเมินประเด็นด้านความยั่งยืนที่สำคัญ</a>
                <a href="#">การสนับสนุนเป้าหมายการพัฒนาที่ยั่งยืน</a>
            </div>
        </div>

        <div class="dropdown">สิ่งแวดล้อม</div>
        <div class="dropdown">สังคม</div>
        <div class="dropdown">การกำกับดูแลและเศรษฐกิจ</div>
    </nav>

    <div class="hero-section">
        <div class="welcome-box">
            <h1>มุ่งสู่ความยั่งยืน ร่วมสร้างอนาคตสีเขียว</h1>
            <p>บริษัท ยูเนี่ยนปิโตรเคมีคอล จำกัด (มหาชน)</p>
            <div style="margin-top: 30px;">
                <a href="สารจากประธานกรรมการบริษัท.html" style="text-decoration: none; background: #72ce60; color: white; padding: 12px 30px; border-radius: 50px; font-weight: bold; transition: 0.3s; display: inline-block;">อ่านสารจากประธาน</a>
            </div>
        </div>
    </div>

</body>
</html>
