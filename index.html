<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Web Ukem - ESG Project</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Sarabun', sans-serif; 
            min-height: 100vh;
            /* กำหนดชุดสีที่ต้องการให้ไหลวน (เขียวอ่อน, เหลืองนวล, ขาว) */
            background: linear-gradient(-45deg, #f1f8e9, #e6ee9c, #fff59d, #dcedc8);
            background-size: 400% 400%; /* ขยายขนาดเพื่อให้สีไหลได้ */
            animation: gradientMove 12s ease infinite; /* ความเร็ว 12 วินาที วนไปเรื่อยๆ */
            display: flex;
            flex-direction: column;
        }

        /* --- โค้ดคำสั่งทำให้พื้นหลังขยับ --- */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* เมนูหลัก */
        .main-nav {
            display: flex;
            align-items: center;
            padding: 0 50px;
            background: rgba(255, 255, 255, 0.9); /* ขาวโปร่งแสงเพื่อให้เห็นสีพื้นหลังข้างหลัง */
            height: 70px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .main-nav a {
            text-decoration: none;
            display: flex;
            align-items: center;
            height: 100%;
        }

        .dropdown {
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 15px;
            cursor: pointer;
            color: #004a80;
            font-weight: bold;
            height: 100%;
            transition: 0.3s;
        }

        .dropdown:hover {
            color: #b08d3e;
            border-bottom: 3px solid #b08d3e;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 70px; 
            left: 0;
            background-color: white;
            min-width: 350px; 
            box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
            z-index: 100;
            padding: 10px 0;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown-content a {
            color: #333;
            padding: 15px 25px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            font-weight: normal;
        }

        /* ส่วนกลางหน้าจอ */
        .hero-section { 
            flex-grow: 1; /* ดันเนื้อหาให้อยู่กลางจอ */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10%; 
        }

        /* กล่องข้อความต้อนรับ */
        .welcome-box {
            background: rgba(255, 255, 255, 0.85); /* พื้นหลังกล่องจางๆ */
            padding: 50px 80px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 6px solid #72ce60;
            backdrop-filter: blur(10px); /* ทำให้พื้นที่หลังกล่องดูเบลอสวยงาม */
        }

        h1 { color: #1b5e20; font-size: 36px; margin-bottom: 10px; }
        p { color: #444; font-size: 18px; margin: 0; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <a href="index.html" class="dropdown">🏠</a>
        <a href="https://www.unionpetrochemical.com/th/" target="_blank" class="dropdown">เว็บไซต์หลัก</a>
        
        <div class="dropdown">
            ภาพรวมความยั่งยืน
            <div class="dropdown-content">
                <a href="สารจากประธานกรรมการบริษัท.html">สารจากประธานกรรมการบริษัท</a>
                <a href="#">การประเมินประเด็นด้านความยั่งยืนที่สำคัญ</a>
                <a href="#">การสนับสนุนเป้าหมายการพัฒนาที่ยั่งยืน</a>
            </div>
        </div>

        <div class="dropdown">สิ่งแวดล้อม</div>
        <div class="dropdown">สังคม</div>
        <div class="dropdown">การกำกับดูแลและเศรษฐกิจ</div>
    </nav>

    <div class="hero-section">
        <div class="welcome-box">
            <h1>รอคำคมเท่ๆ ESG</h1>
            <p>บริษัท ยูเนี่ยนปิโตรเคมีคอล จำกัด (มหาชน)</p>
            <div style="margin-top: 30px;">
            </div>
        </div>
    </div>

</body>
</html>
