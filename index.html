<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Web Ukem - ESG Project</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Sarabun', sans-serif; 
            background: linear-gradient(135deg, #c5e1a5 0%, #e6ee9c 50%, #fff59d 100%);
            min-height: 100vh;
        }

        /* เมนูหลัก */
        .main-nav {
            display: flex;
            align-items: center;
            padding: 0 50px;
            background: white;
            height: 70px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .menu-items { display: flex; list-style: none; padding: 0; margin: 0; height: 100%; }
        
        /* สไตล์รายการเมนูแต่ละช่อง */
        .dropdown {
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 15px;
            cursor: pointer;
            color: #004a80;
            font-weight: bold;
            height: 100%;
        }

        /* เส้นใต้สีเหลืองทองเมื่อชี้ ตามรูป image_650822.png */
        .dropdown:hover {
            color: #b08d3e;
            border-bottom: 3px solid #b08d3e;
        }

        /* กล่องรายการที่ซ่อนอยู่ (Dropdown Content) */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 70px; /* ให้เริ่มต่อจากแถบเมนูพอดี */
            left: 0;
            background-color: white;
            min-width: 350px; /* กว้างหน่อยตามรูป */
            box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
            z-index: 1;
            padding: 10px 0;
        }

        /* แสดงเมื่อเอาเมาส์ชี้ */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* รายการย่อยข้างในตามรูป image_650822.png */
        .dropdown-content a {
            color: #333;
            padding: 15px 25px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            font-weight: normal;
        }

        .dropdown-content a:hover {
            background-color: #f9f9f9;
            color: #004a80;
        }

        /* ลูกศรชี้ขวา */
        .dropdown-content a::after {
            content: "→";
            color: #004a80;
        }

        .hero-section { padding: 60px 10%; display: flex; gap: 50px; align-items: center; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="dropdown">🏠</div>
        
        <!-- เมนูที่มี Dropdown ตามแบบ -->
        <div class="dropdown">
            ภาพรวมความยั่งยืน
            <div class="dropdown-content">
                <a href="#">สารจากคณะกรรมการบริษัท</a>
                <a href="#">การประเมินประเด็นด้านความยั่งยืนที่สำคัญ</a>
                <a href="#">ห่วงโซ่คุณค่าของธุรกิจ</a>
                <a href="#">CK มุ่งสู่ความยั่งยืน</a>
                <a href="#">การสนับสนุนเป้าหมายการพัฒนาที่ยั่งยืน</a>
            </div>
        </div>

        <div class="dropdown">สิ่งแวดล้อม</div>
        <div class="dropdown">สังคม</div>
        <div class="dropdown">การกำกับดูแลและเศรษฐกิจ</div>
    </nav>

    <div class="hero-section">
        <h1 style="color: #1b5e20;">ลองเอาเมาส์ชี้ที่ "ภาพรวมความยั่งยืน" ดูครับ</h1>
    </div>

</body>
</html>
