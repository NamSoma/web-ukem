<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Web Ukem - ESG Project</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Sarabun', sans-serif; 
            /* --- แก้ไขส่วนพื้นหลังตรงนี้ --- */
            background-image: url('ชื่อไฟล์รูปของคุณ.jpg'); /* ใส่ชื่อไฟล์รูปที่อัปโหลดขึ้น GitHub */
            background-size: cover;       /* ปรับภาพให้เต็มหน้าจอ */
            background-position: center;  /* จัดภาพให้อยู่กึ่งกลาง */
            background-attachment: fixed; /* ล็อคภาพไม่ให้เลื่อนตามการ Scroll */
            background-repeat: no-repeat;
            /* สำรองไว้เผื่อรูปไม่โหลด ให้แสดงสีไล่เฉดเดิม */
            background-color: #f1f8e9; 
            min-height: 100vh;
        }

        /* เมนูหลัก */
        .main-nav {
            display: flex;
            align-items: center;
            padding: 0 50px;
            /* ปรับให้ขาวโปร่งแสงเล็กน้อยเพื่อให้เห็นภาพพื้นหลังจางๆ */
            background: rgba(255, 255, 255, 0.9); 
            height: 70px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* ตั้งค่าให้ทุกลิงก์ในเมนูไม่มีเส้นใต้ */
        .main-nav a {
            text-decoration: none;
            display: flex;
            align-items: center;
            height: 100%;
        }

        /* สไตล์รายการเมนูแต่ละช่อง */
        .dropdown {
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 15px;
            cursor: pointer;
            color: #004a80;
            font-weight: bold;
            height: 100%;
            transition: 0.3s;
        }

        /* เส้นใต้สีเหลืองทองเมื่อชี้ */
        .dropdown:hover {
            color: #b08d3e;
            border-bottom: 3px solid #b08d3e;
        }

        /* กล่องรายการที่ซ่อนอยู่ (Dropdown Content) */
        .dropdown-content {
            display: none;
            position: absolute;
            top: 70px; 
            left: 0;
            background-color: white;
            min-width: 350px; 
            box-shadow: 0px 8px 16px rgba(0,0,0,0.1);
            z-index: 100;
            padding: 10px 0;
        }

        /* แสดงเมื่อเอาเมาส์ชี้ */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* รายการย่อยข้างใน */
        .dropdown-content a {
            color: #333;
            padding: 15px 25px;
            text-decoration: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            font-weight: normal;
            height: auto;
        }

        .dropdown-content a:hover {
            background-color: #f9f9f9;
            color: #004a80;
        }

        /* ลูกศรชี้ขวา */
        .dropdown-content a::after {
            content: "→";
            color: #004a80;
            margin-left: 10px;
        }

        .hero-section { 
            padding: 100px 10%; 
            text-align: center; 
        }

        /* กล่องข้อความต้อนรับให้ดูเด่นขึ้นบนพื้นหลังภาพ */
        .welcome-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <nav class="main-nav">
        <a href="index.html" class="dropdown">🏠</a>
        <a href="https://www.unionpetrochemical.com/th/" target="_blank" class="dropdown">เว็บไซต์หลัก</a>
        
        <div class="dropdown">
            ภาพรวมความยั่งยืน
            <div class="dropdown-content">
                <a href="สารจากประธานกรรมการบริษัท.html">สารจากประธานกรรมการบริษัท</a>
                <a href="#">การประเมินประเด็นด้านความยั่งยืนที่สำคัญ</a>
                <a href="#">การสนับสนุนเป้าหมายการพัฒนาที่ยั่งยืน</a>
            </div>
        </div>

        <div class="dropdown">สิ่งแวดล้อม</div>
        <div class="dropdown">สังคม</div>
        <div class="dropdown">การกำกับดูแลและเศรษฐกิจ</div>
    </nav>

    <div class="hero-section">
        <div class="welcome-box">
            <h1 style="color: #1b5e20; margin: 0;">ยินดีต้อนรับสู่โปรเจกต์ ESG</h1>
            <p style="color: #333;">บริษัท ยูเนี่ยนปิโตรเคมีคอล จำกัด (มหาชน)</p>
        </div>
    </div>

</body>
</html>
